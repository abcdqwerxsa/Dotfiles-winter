source = /home/$USER/.cache/wal/colors-hyprland

# 单屏锁屏背景（pywallpaper.jpg = 当前桌面壁纸，文件确定存在）
# 不指定 monitor → 应用到所有屏（你单屏 HDMI-A-2）
background {
    path = /home/$USER/wallpapers/pywallpaper.jpg
    blur_size = 5
    blur_passes = 3
    brightness = .6
}

# 大时钟
label {
    text = cmd[update:1000] date +"<b>%I</b>:<b>%M</b>"
    color = $color9
    font_size = 120
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 0
    shadow_size = 5
    position = 0, 180
    halign = center
    valign = center
}

# 日期
label {
    text = cmd[update:1000] date +"<b>%A, %B %d, %Y</b>"
    color = $color4
    font_size = 40
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 0
    shadow_size = 4
    position = 0, 40
    halign = center
    valign = center
}

# 密码输入框
input-field {
    size = 6%, 4%
    outline_thickness = 2
    dots_rounding = 4
    dots_spacing = .5
    inner_color = $backgroundCol
    outer_color = $backgroundCol $backgroundCol
    check_color = $backgroundCol $backgroundCol
    fail_color = $backgroundCol $backgroundCol
    font_color = $color9
    font_family = CodeNewRoman Nerd Font Propo
    fade_on_empty = false
    shadow_color = rgba(0,0,0,0.5)
    shadow_passes = 2
    shadow_size = 2
    rounding = 20
    placeholder_text = <i></i>
    fail_text = <b>FAIL</b>
    position = 0, -120
    halign = center
    valign = center
}
