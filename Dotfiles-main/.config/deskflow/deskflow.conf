# Deskflow server 配置
# 布局：nilpo(Arch) 在左  ←→  windows 在右
# 鼠标移出 nilpo 右边缘 → 进入 windows；从 windows 左边缘移回 → nilpo
# 注意：两边的"屏幕名"必须与各自 hostname/设置一致
#   - Arch 端(server)屏幕名 = nilpo（本机 hostname，默认）
#   - Windows 端(client)在 Deskflow 客户端里把 "Screen Name" 设成 windows

section: screens
    nilpo:
    windows:
end

section: links
    nilpo:
        right = windows
    windows:
        left = nilpo
end

section: options
    # 共享剪贴板（复制粘贴跨机）
    clipboardSharing = true
    # 相对鼠标移动（游戏/远程时关掉）
    relativeMouseMoves = false
end
